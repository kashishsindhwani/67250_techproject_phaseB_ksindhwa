<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../static/script.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Kashish Sindhwani">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="Checkout for MonoMuse tickets">
  <title>Checkout | MonoMuse</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../static/style.css">

</head>

<body onload="addYear()">

  <header>
    <nav>
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="tickets.html">Tickets</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <!-- LOGO -->
  <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">

  <div class="main">

    <h2>Complete Your Ticket Order</h2>
    <p>Please enter your information below to reserve your MonoMuse tickets.</p>

    <form>
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="quantity">Ticket Quantity:</label><br>
      <input type="number" id="quantity" name="quantity" min="1" max="10" required><br><br>

      <button type="submit">Submit</button>
    </form>

  </div>

 <footer>
  <p id="copyYear"></p>
 </footer>

</body>
</html>
