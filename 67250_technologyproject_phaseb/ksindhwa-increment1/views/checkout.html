<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="Checkout for MonoMuse tickets">
  <title>Checkout | MonoMuse</title>
  <link rel="stylesheet" href="./static/style.css">
</head>

<body>

  <header>
    <h1>Checkout</h1>
    <nav>
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="tickets.html">Tickets</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <div class="main">
    <h2>Complete Your Ticket Order</h2>
    <p>Please enter your information below to reserve your MonoMuse tickets.</p>

    <form>
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="quantity">Ticket Quantity:</label><br>
      <input type="number" id="quantity" name="quantity" min="1" max="10" required><br><br>

      <button type="submit">Submit</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 MonoMuse. All rights reserved.</p>
  </footer>

</body>
</html>
